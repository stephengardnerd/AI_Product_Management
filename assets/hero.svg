      <stop offset="100%" stop-color="#6f42c1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>

  <g transform="translate(960, 60)" opacity="0.7">
    <rect x="0"   y="40"  width="24" height="90" fill="#6f42c1" opacity="0.6" rx="2"/>
    <rect x="34"  y="20"  width="24" height="110" fill="#1f6feb" opacity="0.6" rx="2"/>
    <rect x="68"  y="60"  width="24" height="70" fill="#2ea043" opacity="0.6" rx="2"/>
    <rect x="102" y="10"  width="24" height="120" fill="#bf3989" opacity="0.6" rx="2"/>
    <rect x="136" y="35"  width="24" height="95" fill="#6f42c1" opacity="0.6" rx="2"/>
    <rect x="170" y="50"  width="24" height="80" fill="#1f6feb" opacity="0.6" rx="2"/>
    <line x1="-8" y1="130" x2="208" y2="130" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  </g>

  <rect x="60" y="70" width="4" height="54" fill="url(#accent)" rx="2"/>

  <text x="80" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="3">
